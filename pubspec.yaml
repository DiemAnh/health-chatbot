name: health_chatbot
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  firebase_messaging: ^16.2.0
  dio: ^5.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  get_it: ^9.2.1
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0
  file_picker: ^11.0.2
  record: ^6.2.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  swagger_dart_code_generator: ^3.0.3

flutter:
  uses-material-design: true
